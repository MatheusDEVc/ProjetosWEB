<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlowUp Store - Produtos de Saúde e Beleza</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            /* Dark Theme Colors */
            --bg-primary: #0f0f1e;
            --bg-secondary: #1a1a2e;
            --bg-tertiary: #16213e;
            --text-primary: #e4e4e7;
            --text-secondary: #a1a1aa;
            --text-muted: #71717a;
            --accent-primary: #d946a6;
            --accent-secondary: #ec4899;
            --accent-tertiary: #f472b6;
            --success: #10b981;
            --warning: #f59e0b;
            --error: #ef4444;
            --border-color: #27272a;
            --shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            --shadow-lg: 0 0 40px rgba(217, 70, 166, 0.2);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Scrollbar Styling */
        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--accent-primary);
            border-radius: 5px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent-secondary);
        }

        #root {
            width: 100%;
            min-height: 100vh;
        }

        /* Smooth scrolling */
        html {
            scroll-behavior: smooth;
        }

        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-50px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(50px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes glow {
            0%, 100% {
                box-shadow: 0 0 20px rgba(217, 70, 166, 0.3);
            }
            50% {
                box-shadow: 0 0 40px rgba(217, 70, 166, 0.6);
            }
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        @keyframes shimmer {
            0% {
                background-position: -1000px 0;
            }
            100% {
                background-position: 1000px 0;
            }
        }

        .scroll-animate {
            animation: fadeInUp 0.6s ease-out forwards;
            opacity: 0;
        }

        .scroll-animate.active {
            opacity: 1;
        }

        .scroll-animate--left {
            animation: slideInLeft 0.6s ease-out forwards;
        }

        .scroll-animate--right {
            animation: slideInRight 0.6s ease-out forwards;
        }

        .scroll-animate--down {
            animation: fadeInDown 0.6s ease-out forwards;
        }

        .glow-effect {
            animation: glow 3s ease-in-out infinite;
        }

        .pulse-effect {
            animation: pulse 2s ease-in-out infinite;
        }

        .float-effect {
            animation: float 3s ease-in-out infinite;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- React e Babel para desenvolvimento -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Scripts da aplicação -->
    <script type="module">
        import { App } from './src/App.jsx';
    </script>

    <!-- Fallback inline -->
    <script type="text/babel">
        // Will be loaded from App.jsx
    </script>
</body>
</html>
